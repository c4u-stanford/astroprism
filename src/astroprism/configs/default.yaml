# =============================================================================
# astroprism default configuration
#
# All values here are used as defaults. Override only what you need in your
# own config file or by modifying cfg after load_config().
#
# Prior params format:
#   Shared across all channels:  [mean, std]
#   Per-channel:                 [[mean, std], [mean, std], ...]
#
# Schedule (maps directly to NIFTy's constants / point_estimates):
#   constant_until: N        — frozen for iters 0..N-1 (0 = never frozen)
#   point_estimate_until: N  — MAP-estimated for iters constant_until..N-1
#                              (0 = never point estimate)
#   Use a large number (e.g. 9999) to stay in a phase forever.
#   Progression: constant → point_estimate → fully sampled
# =============================================================================

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  path:       null          # path to data directory — must be set by user
  instrument: null          # e.g. JWST_MIRI, JWST_NIRCAM, HERSCHEL_PACS
  extension:  "fits"

# ── Field (latent correlated fields) ─────────────────────────────────────────
#
# Prior types fixed by NIFTy: lognormal for fluctuations/flexibility,
# normal for loglogavgslope. Only prior_params can be changed.
# Domain keys: zeromode, fluctuations, loglogavgslope, flexibility, spectrum, xi
# =============================================================================
field:
  offset_mean:    0.0
  offset_std:
    prior_params: [1.0, 0.1]
    constant_until: 0
    point_estimate_until: 0
  fluctuations:
    prior_params: [1.0, 0.1]
    constant_until: 0
    point_estimate_until: 0
  loglogavgslope:
    prior_params: [-3.0, 1.0]
    constant_until: 0
    point_estimate_until: 0
  flexibility:
    prior_params: [0.5, 0.1]
    constant_until: 0
    point_estimate_until: 0

# ── Signal (mixing + activation) ─────────────────────────────────────────────
#
# Domain keys: mixing_matrix (full) or mixing_diag + mixing_off_diag (cholesky),
#              mixing_offset
# =============================================================================
signal:
  activation: "exp"             # exp | softplus | sigmoid | identity | relu | square
  mixing_mode: "full"           # "full" or "cholesky"
  mixing_matrix:
    prior_type:   "normal"
    prior_params: [0.0, 1.0]
    constant_until: 0
    point_estimate_until: 0
  mixing_offset:
    prior_type:   "normal"
    prior_params: [0.0, 1.0]
    constant_until: 0
    point_estimate_until: 0

# ── Response (instrument response) ───────────────────────────────────────────
response:
  psf_smoothing:
    prior_type:   "lognormal"
    prior_params: [1.0, 0.1]
    constant_until:       0
    point_estimate_until: 9999   # MAP forever

  psf_rotation:
    prior_type:   "normal"
    prior_params: [0.0, 0.1]
    constant_until:       0
    point_estimate_until: 9999   # MAP forever

# ── Noise ─────────────────────────────────────────────────────────────────────
noise:
  noise_floor:
    prior_type:   "lognormal"
    prior_params: [0.01, 0.1]   # broadcast to all channels
    constant_until:       5      # frozen for first 5 iters
    point_estimate_until: 9999   # MAP forever after unfreezing

  noise_scale:
    prior_type:   "lognormal"
    prior_params: [0.01, 0.1]
    constant_until:       9999   # frozen forever
    point_estimate_until: 0

# ── Masking (held-out validation) ─────────────────────────────────────────────
#
# Strategy syntax per channel:
#   null              — no masking
#   "full"            — mask entire channel
#   "bottom"          — mask entire bottom half
#   "bottom:0.3"      — random 30% within bottom half
#   0.3               — random 30% of all pixels
#
# Convention: masked pixels are held out from training for validation.
# =============================================================================
masking:
  enabled:    false
  seed:       42
  strategies: []              # one entry per channel; empty = no masking

# ── Inference ─────────────────────────────────────────────────────────────────
inference:
  n_iterations:     20
  n_samples:        4
  output_directory: "output/run_001"
  seed:             42
  sample_mode:      "linear_resample"   # linear_resample | nonlinear_resample | nonlinear_update
  resume:           true

# ── Solver ────────────────────────────────────────────────────────────────────
solver:
  ls_absdelta:  1.0e-3
  ls_maxiter:   1000
  nls_xtol:     1.0e-2
  nls_maxiter:  5
  kl_absdelta:  1.0e-2
  kl_xtol:      1.0e-8
  kl_maxiter:   100
